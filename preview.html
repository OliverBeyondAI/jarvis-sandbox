<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Concepts — BeyondAI</title>
  <style>
    :root {
      --color-bg: #0a0a0f;
      --color-surface: #12121a;
      --color-border: rgba(255, 255, 255, 0.06);
      --color-text: #e8e8ed;
      --color-text-muted: #8a8a9a;
      --color-primary: #6c5ce7;
      --color-primary-light: #a29bfe;
      --color-accent: #00cec9;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .header h1 span {
      background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1200px;
      width: 100%;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--color-primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .card-label {
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .card-letter {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
    }

    .card:nth-child(2) .card-letter {
      background: linear-gradient(135deg, var(--color-accent), #00b894);
    }

    .card:nth-child(3) .card-letter {
      background: linear-gradient(135deg, #e17055, #fdcb6e);
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    @media (max-width: 768px) {
      body {
        padding: 2rem 1.25rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>Hero Concepts</span> — Compare</h1>
    <p>Three visual directions for the BeyondAI hero section.</p>
  </div>

  <div class="grid">
    <div class="card">
      <img src="hero-concept-a.png" alt="Concept A — The Advisor">
      <div class="card-label">
        <div class="card-letter">A</div>
        <div>
          <div class="card-name">The Advisor</div>
          <div class="card-subtitle">Concept A</div>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="hero-concept-b.png" alt="Concept B — The Strategist">
      <div class="card-label">
        <div class="card-letter">B</div>
        <div>
          <div class="card-name">The Strategist</div>
          <div class="card-subtitle">Concept B</div>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="hero-concept-c.png" alt="Concept C — The Partner">
      <div class="card-label">
        <div class="card-letter">C</div>
        <div>
          <div class="card-name">The Partner</div>
          <div class="card-subtitle">Concept C</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
