<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Transcriber</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>">
<style>
  :root {
    --bg-primary: #0c0c0f;
    --bg-secondary: #151519;
    --bg-tertiary: #1e1e24;
    --bg-hover: #26262e;
    --border: #2a2a35;
    --border-light: #3a3a48;
    --text-primary: #e8e8ec;
    --text-secondary: #9494a8;
    --text-muted: #5e5e72;
    --accent: #7c6aef;
    --accent-hover: #6b59de;
    --accent-glow: rgba(124, 106, 239, 0.12);
    --accent-glow-strong: rgba(124, 106, 239, 0.25);
    --success: #34d399;
    --error: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    gap: 10px;
  }
  .header svg {
    width: 24px;
    height: 24px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header span {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Main Content */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Upload Area */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--bg-secondary);
    position: relative;
  }
  .upload-area:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .upload-area.dragover {
    border-color: var(--accent);
    background: var(--accent-glow-strong);
    transform: scale(1.005);
  }
  .upload-icon {
    width: 48px;
    height: 48px;
    color: var(--text-muted);
    margin: 0 auto 16px;
    transition: color var(--transition);
  }
  .upload-area:hover .upload-icon,
  .upload-area.dragover .upload-icon { color: var(--accent); }
  .upload-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .upload-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .upload-formats {
    display: inline-flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .format-badge {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .file-input { display: none; }

  /* File Info Bar */
  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-top: 16px;
    font-size: 13px;
  }
  .file-info.visible { display: flex; }
  .file-info svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
  .file-name { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { color: var(--text-secondary); flex-shrink: 0; }
  .file-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color var(--transition);
    display: flex;
    flex-shrink: 0;
  }
  .file-remove:hover { color: var(--error); }
  .file-remove svg { width: 16px; height: 16px; }

  /* Transcribe Button */
  .transcribe-section {
    margin-top: 20px;
    text-align: center;
  }
  .btn-transcribe {
    padding: 12px 36px;
    font-size: 14px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.2px;
  }
  .btn-transcribe:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(124, 106, 239, 0.3);
  }
  .btn-transcribe:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  .progress-section {
    display: none;
    margin-top: 32px;
    text-align: center;
  }
  .progress-section.visible { display: block; }

  .spinner-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .progress-step {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* Elapsed timer */
  .elapsed {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.25);
    border-radius: var(--radius-sm);
    color: var(--error);
    font-size: 13px;
    line-height: 1.5;
  }
  .error-msg.visible { display: block; }

  /* Results */
  .results {
    display: none;
    margin-top: 32px;
    gap: 20px;
  }
  .results.visible {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    max-height: 650px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
  }
  .panel-actions {
    display: flex;
    gap: 6px;
  }
  .panel-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all var(--transition);
  }
  .panel-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--border-light);
  }
  .panel-btn.copied {
    background: rgba(52, 211, 153, 0.12);
    border-color: rgba(52, 211, 153, 0.35);
    color: var(--success);
  }
  .panel-btn svg { width: 12px; height: 12px; }

  .panel-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    font-size: 14px;
    line-height: 1.75;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel-body::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  /* Transcript Formatting */
  .timestamp {
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-right: 8px;
    opacity: 0.8;
    user-select: none;
  }
  .transcript-block {
    margin-bottom: 14px;
    padding-left: 0;
  }
  .speaker-label {
    color: var(--success);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.3px;
  }

  /* Summary Formatting */
  .summary-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    margin-top: 22px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .summary-section-title:first-child { margin-top: 0; }
  .summary-item {
    padding: 3px 0 3px 16px;
    color: var(--text-primary);
    position: relative;
  }
  .summary-item::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--text-muted);
    font-weight: 700;
  }
  .summary-text {
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main { padding: 20px 16px; }
    .results.visible { grid-template-columns: 1fr; }
    .panel { max-height: 500px; }
    .upload-area { padding: 40px 16px; }
    .header { padding: 14px 16px; }
    .header h1 { font-size: 16px; }
    .upload-title { font-size: 15px; }
    .upload-subtitle { font-size: 13px; }
  }

  @media (max-width: 480px) {
    .panel-header { flex-direction: column; gap: 8px; align-items: flex-start; }
    .file-info { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
  <h1>Jarvis Transcriber</h1>
  <span>AI-Powered</span>
</div>

<!-- Main -->
<div class="main">
  <!-- Upload -->
  <div class="upload-area" id="uploadArea">
    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="upload-title">Drop an audio file here or click to upload</div>
    <div class="upload-subtitle">Transcribe and summarize audio files with AI</div>
    <div class="upload-formats">
      <span class="format-badge">M4A</span>
      <span class="format-badge">MP3</span>
      <span class="format-badge">WAV</span>
      <span class="format-badge">OPUS</span>
      <span class="format-badge">OGG</span>
      <span class="format-badge">WEBM</span>
    </div>
  </div>
  <input type="file" class="file-input" id="fileInput" accept=".m4a,.mp3,.wav,.opus,.ogg,.webm,audio/*">

  <!-- File Info -->
  <div class="file-info" id="fileInfo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <span class="file-name" id="fileName"></span>
    <span class="file-size" id="fileSize"></span>
    <button class="file-remove" onclick="removeFile()" title="Remove file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Transcribe Button -->
  <div class="transcribe-section">
    <button class="btn-transcribe" id="transcribeBtn" onclick="startTranscription()" disabled>
      Transcribe Audio
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progress">
    <div class="spinner-container">
      <div class="spinner"></div>
      <div class="progress-text" id="progressText">Processing...</div>
    </div>
    <div class="progress-step" id="progressStep"></div>
    <div class="elapsed" id="elapsed"></div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Results -->
  <div class="results" id="results">
    <!-- Transcript Panel (left) -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Full Transcript</span>
        <div class="panel-actions">
          <button class="panel-btn" onclick="copyPanel('transcript', this)" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>Copy</span>
          </button>
          <button class="panel-btn" onclick="downloadPanel('transcript')" title="Download as .txt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Download</span>
          </button>
        </div>
      </div>
      <div class="panel-body" id="transcriptBody"></div>
    </div>

    <!-- Summary Panel (right) -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Summary & Key Points</span>
        <div class="panel-actions">
          <button class="panel-btn" onclick="copyPanel('summary', this)" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>Copy</span>
          </button>
          <button class="panel-btn" onclick="downloadPanel('summary')" title="Download as .txt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Download</span>
          </button>
        </div>
      </div>
      <div class="panel-body" id="summaryBody"></div>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let selectedFile = null;
  let transcriptText = '';
  let summaryText = '';
  let elapsedTimer = null;

  // ── DOM refs ──
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const transcribeBtn = document.getElementById('transcribeBtn');
  const progressEl = document.getElementById('progress');
  const progressText = document.getElementById('progressText');
  const progressStep = document.getElementById('progressStep');
  const elapsedEl = document.getElementById('elapsed');
  const errorMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');
  const transcriptBody = document.getElementById('transcriptBody');
  const summaryBody = document.getElementById('summaryBody');

  // ── Upload handling ──
  uploadArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  const VALID_EXTENSIONS = ['.m4a', '.mp3', '.wav', '.opus', '.ogg', '.webm'];

  function handleFile(file) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!VALID_EXTENSIONS.includes(ext)) {
      showError('Unsupported file type. Please use M4A, MP3, WAV, OPUS, OGG, or WEBM.');
      return;
    }
    if (file.size > 25 * 1024 * 1024) {
      showError('File is too large. Maximum size is 25 MB.');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);
    fileInfo.classList.add('visible');
    transcribeBtn.disabled = false;
    hideError();
    results.classList.remove('visible');
  }

  function removeFile() {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.classList.remove('visible');
    transcribeBtn.disabled = true;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  // ── Error display ──
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }
  function hideError() {
    errorMsg.classList.remove('visible');
  }

  // ── Progress display ──
  function showProgress(text, step) {
    progressEl.classList.add('visible');
    progressText.textContent = text;
    progressStep.textContent = step || '';
    startElapsedTimer();
  }
  function hideProgress() {
    progressEl.classList.remove('visible');
    stopElapsedTimer();
  }

  function startElapsedTimer() {
    const start = Date.now();
    elapsedEl.textContent = '0s';
    elapsedTimer = setInterval(() => {
      const secs = Math.floor((Date.now() - start) / 1000);
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      elapsedEl.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
    }, 1000);
  }
  function stopElapsedTimer() {
    if (elapsedTimer) {
      clearInterval(elapsedTimer);
      elapsedTimer = null;
    }
  }

  // ── Main transcription flow ──
  async function startTranscription() {
    if (!selectedFile) return;

    hideError();
    results.classList.remove('visible');
    transcribeBtn.disabled = true;

    showProgress('Transcribing audio...', 'Uploading file and processing with AI — this may take a minute');

    try {
      const formData = new FormData();
      formData.append('file', selectedFile);

      const response = await fetch('https://jarvis.beyondai.help/transcribe', {
        method: 'POST',
        body: formData,
      });

      if (!response.ok) {
        let detail = `Server error (${response.status})`;
        try {
          const errData = await response.json();
          if (errData.detail) detail = errData.detail;
        } catch (_) {}
        throw new Error(detail);
      }

      const data = await response.json();

      // Extract transcript
      transcriptText = data.transcript || '';
      displayTranscript(transcriptText);

      // Extract summary
      const summary = data.summary || {};
      summaryText = formatSummaryAsText(summary);
      displaySummary(summary);

      hideProgress();
      results.classList.add('visible');

    } catch (err) {
      hideProgress();
      showError(err.message || 'An unexpected error occurred. Please try again.');
    } finally {
      transcribeBtn.disabled = !selectedFile;
    }
  }

  // ── Display transcript ──
  function displayTranscript(text) {
    if (!text) {
      transcriptBody.innerHTML = '<div style="color:var(--text-muted)">No transcript available.</div>';
      return;
    }
    // Parse timestamps like [00:00] or [MM:SS]
    const blocks = text.split(/\n\n+/);
    let html = '';
    const tsPattern = /^\[(\d{1,2}:\d{2})\]\s*/;
    const speakerPattern = /^(Speaker\s+\d+):\s*/i;

    for (const block of blocks) {
      const trimmed = block.trim();
      if (!trimmed) continue;
      let line = trimmed;
      let tsHtml = '';
      let speakerHtml = '';

      const tsMatch = line.match(tsPattern);
      if (tsMatch) {
        tsHtml = `<span class="timestamp">[${tsMatch[1]}]</span>`;
        line = line.replace(tsPattern, '');
      }

      const spkMatch = line.match(speakerPattern);
      if (spkMatch) {
        speakerHtml = `<span class="speaker-label">${escapeHtml(spkMatch[1])}:</span> `;
        line = line.replace(speakerPattern, '');
      }

      html += `<div class="transcript-block">${tsHtml}${speakerHtml}${escapeHtml(line)}</div>`;
    }

    // If no blocks parsed, show raw text
    if (!html) {
      html = `<div class="transcript-block">${escapeHtml(text)}</div>`;
    }

    transcriptBody.innerHTML = html;
  }

  // ── Display summary ──
  function displaySummary(summary) {
    if (!summary || typeof summary !== 'object') {
      summaryBody.innerHTML = '<div style="color:var(--text-muted)">No summary available.</div>';
      return;
    }

    let html = '';

    if (summary.brief_summary) {
      html += `<div class="summary-section-title">Summary</div>`;
      html += `<div class="summary-text">${escapeHtml(summary.brief_summary)}</div>`;
    }

    if (summary.main_topics && summary.main_topics.length) {
      html += `<div class="summary-section-title">Main Topics</div>`;
      for (const item of summary.main_topics) {
        html += `<div class="summary-item">${escapeHtml(item)}</div>`;
      }
    }

    if (summary.key_insights && summary.key_insights.length) {
      html += `<div class="summary-section-title">Key Insights</div>`;
      for (const item of summary.key_insights) {
        html += `<div class="summary-item">${escapeHtml(item)}</div>`;
      }
    }

    if (summary.action_items && summary.action_items.length) {
      html += `<div class="summary-section-title">Action Items</div>`;
      for (const item of summary.action_items) {
        html += `<div class="summary-item">${escapeHtml(item)}</div>`;
      }
    }

    if (summary.people_mentioned && summary.people_mentioned.length) {
      html += `<div class="summary-section-title">People & Companies</div>`;
      for (const item of summary.people_mentioned) {
        html += `<div class="summary-item">${escapeHtml(item)}</div>`;
      }
    }

    if (!html) {
      // Fallback: display summary as string
      const str = typeof summary === 'string' ? summary : JSON.stringify(summary, null, 2);
      html = `<div class="summary-text">${escapeHtml(str)}</div>`;
    }

    summaryBody.innerHTML = html;
  }

  // ── Format summary object to plain text for download/copy ──
  function formatSummaryAsText(summary) {
    if (!summary || typeof summary !== 'object') return '';
    let parts = [];

    if (summary.brief_summary) {
      parts.push('SUMMARY\n' + summary.brief_summary);
    }
    if (summary.main_topics && summary.main_topics.length) {
      parts.push('MAIN TOPICS\n' + summary.main_topics.map(t => '- ' + t).join('\n'));
    }
    if (summary.key_insights && summary.key_insights.length) {
      parts.push('KEY INSIGHTS\n' + summary.key_insights.map(t => '- ' + t).join('\n'));
    }
    if (summary.action_items && summary.action_items.length) {
      parts.push('ACTION ITEMS\n' + summary.action_items.map(t => '- ' + t).join('\n'));
    }
    if (summary.people_mentioned && summary.people_mentioned.length) {
      parts.push('PEOPLE & COMPANIES\n' + summary.people_mentioned.map(t => '- ' + t).join('\n'));
    }

    return parts.join('\n\n');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Copy & Download ──
  function copyPanel(type, btn) {
    const text = type === 'transcript' ? transcriptText : summaryText;
    navigator.clipboard.writeText(text).then(() => {
      const label = btn.querySelector('span');
      const orig = label.textContent;
      btn.classList.add('copied');
      label.textContent = 'Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        label.textContent = orig;
      }, 1500);
    });
  }

  function downloadPanel(type) {
    const text = type === 'transcript' ? transcriptText : summaryText;
    if (!text) return;
    const baseName = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'audio';
    const suffix = type === 'transcript' ? 'transcript' : 'summary';
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${baseName}_${suffix}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
